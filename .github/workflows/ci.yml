name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: platzi-fc/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: platzi-fc

      - name: Lint
        run: npm run lint
        working-directory: platzi-fc

      - name: Type check
        run: npx tsc --noEmit
        working-directory: platzi-fc

      - name: Build
        run: npm run build
        working-directory: platzi-fc
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: https://platzi-fc.vercel.app
